name: docker-build

on:
  push:
    branches:
      - "master"
  workflow_dispatch:  # Allow manual triggering

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}
      - name: Build and push GLM vLLM image
        env:
          IMAGE_NAME: ${{ vars.DOCKER_USER }}/glm-vllm:4.7-flash-4bit
        run: |
          docker build --pull -t "$IMAGE_NAME" -f glm-deployment/docker/glm-vllm/Dockerfile glm-deployment/docker/glm-vllm
          docker push "$IMAGE_NAME"